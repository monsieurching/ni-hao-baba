<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>你好爸爸</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">

    <div id="photo-panel">
      <div id="photo-blur"></div>
      <img id="photo-img" src="/static/photos/photo1.jpg" alt="">
      <div id="header-text">
        <div class="monogram">M.B.</div>
        <h1>你好爸爸</h1>
        <p class="byline">By Monsieur Ching</p>
      </div>
    </div>

    <div id="content-panel">
      <div id="card" class="playable" role="button" tabindex="0" aria-label="Tap to hear Baba's answer">
        <div id="card-label"></div>
        <div id="card-question"></div>
        <div id="card-hint">&#9654;</div>
        <div id="card-answer" class="hidden">
          <div class="answer-rule"><span>Baba's answer</span></div>
          <div id="answer-meta"></div>
          <div id="answer-text"></div>
          <button id="replay-btn">&#9654; &nbsp;Play again</button>
        </div>
      </div>

      <div id="card-nav">
        <button id="prev-btn" title="Previous (←)">&#8592;</button>
        <span id="counter-text">– / –</span>
        <button id="next-btn" title="Next (→)">&#8594;</button>
      </div>
    </div>

  </div>

  <audio id="baba-audio" preload="none"></audio>

  <script>
    const PHOTOS = [
      "/static/photos/photo1.jpg",
      "/static/photos/photo2.jpg",
      "/static/photos/photo3.jpg",
      "/static/photos/photo4.jpg",
      "/static/photos/photo5.jpg",
      "/static/photos/photo6.jpg",
      "/static/photos/photo7.jpg",
      "/static/photos/photo8.jpg",
      "/static/photos/photo9.jpg",
    ];

    // Card palettes [bg, border, accent (left edge)]
    const CARD_COLORS = [
      ["#FFFCF7", "#E8DDD0", "#C9962A"],  // ivory    / gold
      ["#FDF3F0", "#EDD8D2", "#B85450"],  // rose     / terracotta
      ["#F4F6F0", "#D8DECC", "#6B8A6B"],  // sage     / green
      ["#FEF8ED", "#E8D9A8", "#A07418"],  // gold     / amber
      ["#F6F2F7", "#DCCFE0", "#8B6B8E"],  // lavender / mauve
    ];

    // ── Elements ─────────────────────────────────────────────────────
    const cardEl     = document.getElementById("card");
    const labelEl    = document.getElementById("card-label");
    const questionEl = document.getElementById("card-question");
    const hintEl     = document.getElementById("card-hint");
    const answerEl   = document.getElementById("card-answer");
    const answerMeta = document.getElementById("answer-meta");
    const answerText = document.getElementById("answer-text");
    const replayBtn  = document.getElementById("replay-btn");
    const counterEl  = document.getElementById("counter-text");
    const prevBtn    = document.getElementById("prev-btn");
    const nextBtn    = document.getElementById("next-btn");
    const audioEl    = document.getElementById("baba-audio");
    const photoImg   = document.getElementById("photo-img");
    const photoBlur  = document.getElementById("photo-blur");

    let cards       = [];
    let currentIdx  = 0;
    let photoIdx    = 0;
    let audioPrimed = false;

    // ── Swipe ─────────────────────────────────────────────────────────
    let touchStartX = 0;
    let didSwipe    = false;

    document.addEventListener("touchstart", e => {
      touchStartX = e.touches[0].clientX;
      didSwipe    = false;
    }, { passive: true });

    document.addEventListener("touchmove", e => {
      if (Math.abs(e.touches[0].clientX - touchStartX) > 12) didSwipe = true;
    }, { passive: true });

    document.addEventListener("touchend", e => {
      if (!didSwipe) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 48) {
        if (dx < 0) nextBtn.click();
        else        prevBtn.click();
      }
    }, { passive: true });

    // ── Audio ─────────────────────────────────────────────────────────
    function primeAudio() {
      if (audioPrimed) return;
      audioPrimed = true;
      const p = audioEl.play();
      if (p) p.catch(() => {});
      audioEl.pause();
    }

    function playClip(segments) {
      const url = `/clip?segments=${encodeURIComponent(JSON.stringify(segments))}`;
      audioEl.pause();
      audioEl.src = url;
      audioEl.load();
      audioEl.play().catch(() => {});
    }

    // ── Card rendering ────────────────────────────────────────────────
    function renderCard() {
      const c = cards[currentIdx];
      const [bg, border, accent] = CARD_COLORS[currentIdx % CARD_COLORS.length];

      labelEl.textContent    = c.label || "";
      questionEl.textContent = c.question;
      counterEl.textContent  = `${currentIdx + 1} / ${cards.length}`;
      answerEl.classList.add("hidden");
      answerText.textContent = "";
      answerMeta.textContent = "";
      hintEl.style.display   = "";
      cardEl.classList.add("playable");

      cardEl.style.setProperty("--card-bg",     bg);
      cardEl.style.setProperty("--card-border", border);
      cardEl.style.setProperty("--card-accent", accent);

      prevBtn.disabled = currentIdx === 0;
      nextBtn.disabled = currentIdx === cards.length - 1;
    }

    function showCard(idx) {
      cardEl.classList.add("fading");
      setTimeout(() => {
        currentIdx = idx;
        renderCard();
        cardEl.classList.remove("fading");
      }, 180);
    }

    function revealAnswer() {
      const c    = cards[currentIdx];
      const segs = c.custom_segments || c.segments;
      const dur  = segs.reduce((s, seg) => s + (seg[1] - seg[0]), 0);
      const mins = Math.floor(dur / 60);
      const secs = Math.round(dur % 60);
      const fmt  = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;

      answerMeta.textContent = `${c.start_fmt} · ${fmt}`;
      answerText.textContent = c.answer_text || "";
      answerEl.classList.remove("hidden");
      hintEl.style.display = "none";
      cardEl.classList.remove("playable");
    }

    // ── Card click ────────────────────────────────────────────────────
    cardEl.addEventListener("click", () => {
      if (didSwipe) return;
      if (!cardEl.classList.contains("playable")) return;
      primeAudio();
      playClip(cards[currentIdx].custom_segments || cards[currentIdx].segments);
      revealAnswer();
    });

    cardEl.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); cardEl.click(); }
    });

    replayBtn.addEventListener("click", e => {
      e.stopPropagation();
      primeAudio();
      playClip(cards[currentIdx].custom_segments || cards[currentIdx].segments);
    });

    // ── Navigation ────────────────────────────────────────────────────
    prevBtn.addEventListener("click", () => { if (currentIdx > 0) showCard(currentIdx - 1); });
    nextBtn.addEventListener("click", () => { if (currentIdx < cards.length - 1) showCard(currentIdx + 1); });

    document.addEventListener("keydown", e => {
      if (e.target === cardEl) return;
      if (e.key === "ArrowLeft")  prevBtn.click();
      if (e.key === "ArrowRight") nextBtn.click();
    });

    // ── Photo rotation ────────────────────────────────────────────────
    function cyclePhoto() {
      photoImg.style.opacity  = "0";
      photoBlur.style.opacity = "0";
      setTimeout(() => {
        photoIdx = (photoIdx + 1) % PHOTOS.length;
        const src = PHOTOS[photoIdx];
        photoImg.src = src;
        photoBlur.style.backgroundImage = `url('${src}')`;
        photoImg.style.opacity  = "1";
        photoBlur.style.opacity = "1";
      }, 700);
    }

    setInterval(cyclePhoto, 5000);

    // ── Load ──────────────────────────────────────────────────────────
    fetch("/questions")
      .then(r => r.json())
      .then(qs => {
        cards = qs;
        if (cards.length) renderCard();
      });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>你好爸爸</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="monogram">M.B.</div>
      <h1>你好爸爸</h1>
      <p class="byline">By Monsieur Ching</p>
    </header>

    <div id="questions-strip">
      <p class="qs-label">Questions from the interview</p>
      <div id="question-chips"></div>
    </div>

    <div id="chat-window">
      <div id="messages">
        <div class="message assistant">
          <div class="msg-label">Baba</div>
          <div class="bubble">
            你好. Click a question above, or ask me something in your own words.
          </div>
        </div>
      </div>
    </div>

    <div id="input-area">
      <textarea
        id="user-input"
        placeholder="Ask Baba something… (Enter to send)"
        rows="2"
        autofocus
      ></textarea>
      <button id="send-btn" title="Send">&#9654;</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("user-input");
    const sendBtn    = document.getElementById("send-btn");
    const chipsEl    = document.getElementById("question-chips");

    let isLoading    = false;
    let currentAudio = null;

    // ── Load question chips ──────────────────────────────────────────
    fetch("/questions")
      .then(r => r.json())
      .then(qs => {
        let addedDivider = false;
        qs.forEach(q => {
          // Insert divider before the first non-featured, non-custom chip
          if (!addedDivider && typeof q.id === "number" && !q.custom_segments) {
            const div = document.createElement("span");
            div.className = "chip-divider";
            chipsEl.appendChild(div);
            addedDivider = true;
          }

          const chip = document.createElement("button");
          chip.className = q.custom_segments ? "chip chip-special" : "chip";
          chip.textContent = q.question.length > 90
            ? q.question.slice(0, 90) + "…"
            : q.question;
          chip.title = q.question;

          if (q.custom_segments) {
            // Custom chips play audio directly without going through /chat
            chip.addEventListener("click", () => {
              appendMessage("user", escHtml(q.question));
              const segs = q.custom_segments;
              const dur  = segs.reduce((s, seg) => s + (seg[1] - seg[0]), 0);
              const mins = Math.floor(dur / 60);
              const secs = Math.round(dur % 60);
              const durFmt = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
              const segsJson = escHtml(JSON.stringify(segs));
              appendMessage("assistant", `
                <div class="answer-meta">${escHtml(q.start_fmt)} · ${durFmt}</div>
                <button class="replay-btn" onclick="playClip(null, null, ${segsJson})">
                  ▶ Play again
                </button>
              `);
              playClip(null, null, segs);
              scrollToBottom();
            });
          } else {
            chip.addEventListener("click", () => {
              inputEl.value = q.question;
              sendMessage();
            });
          }

          chipsEl.appendChild(chip);
        });
      });

    // ── Helpers ──────────────────────────────────────────────────────
    function scrollToBottom() {
      const w = document.getElementById("chat-window");
      w.scrollTop = w.scrollHeight;
    }

    function appendMessage(role, html) {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const label = document.createElement("div");
      label.className   = "msg-label";
      label.textContent = role === "user" ? "You" : "Baba";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = html;

      wrapper.appendChild(label);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
      return bubble;
    }

    function setLoading(on) {
      isLoading        = on;
      sendBtn.disabled = on;
      inputEl.disabled = on;
      sendBtn.innerHTML = on ? "…" : "&#9654;";
    }

    function playClip(start, end, segments) {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      const url = segments
        ? `/clip?segments=${encodeURIComponent(JSON.stringify(segments))}`
        : `/clip?start=${start}&end=${end}`;
      currentAudio = new Audio(url);
      currentAudio.play().catch(() => {});
    }

    // ── Send ─────────────────────────────────────────────────────────
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      inputEl.value = "";
      appendMessage("user", escHtml(text));
      setLoading(true);

      const loadingBubble = appendMessage("assistant", '<span class="cursor">▌</span>');

      try {
        const res  = await fetch("/chat", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ message: text }),
        });
        const data = await res.json();

        if (data.error) {
          loadingBubble.innerHTML = `<em>${escHtml(data.error)}</em>`;
        } else {
          const dur  = data.baba_duration || Math.round(data.clip_end - data.clip_start);
          const mins = Math.floor(dur / 60);
          const secs = dur % 60;
          const durFmt = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
          const segs = data.baba_segments || null;
          const segsJson = segs ? escHtml(JSON.stringify(segs)) : "null";
          loadingBubble.innerHTML = `
            <div class="answer-meta">${escHtml(data.start_fmt)} · ${durFmt}</div>
            <button class="replay-btn" onclick="playClip(${data.clip_start}, ${data.clip_end}, ${segsJson})">
              ▶ Play again
            </button>
          `;
          playClip(data.clip_start, data.clip_end, segs);
        }
      } catch (err) {
        loadingBubble.innerHTML = `<em>Connection error: ${escHtml(err.message)}</em>`;
      }

      setLoading(false);
      inputEl.focus();
      scrollToBottom();
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
